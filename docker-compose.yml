version: '3.8'

services:
  nodejs-backend:
    build: .
    container_name: nodejs-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=${DB_HOST:-localhost}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-appdb}
      - DB_USER=${DB_USER:-user}
      - DB_PASSWORD=${DB_PASSWORD:-password}
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped